<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finalook Studio</title>

    <script>
      // Usamos "Finalook Studio" para que coincida exactamente con tu variable de GitHub
      window.ENV = { NOMBRE_TIENDA: "Finalook Studio" };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />

    <style>
        /* VARIABLES DE ESTILO - Estética Minimalista y Sofisticada */
        :root {
            --negro: #080808;
            --marfil: #F5F0E8;
            --dorado: #C9A84C;
            --gris-suave: #f9f9f9;
            --font-principal: 'Cormorant Garamond', serif;
            --font-secundaria: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--marfil);
            color: var(--negro);
            font-family: var(--font-secundaria);
            line-height: 1.6;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background-color: white;
            border-bottom: 1px solid #eee;
        }

        h1 {
            font-family: var(--font-principal);
            font-size: 3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* GRILLA DE PRODUCTOS */
        .productos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .producto-card {
            background: white;
            padding: 15px;
            transition: transform 0.3s ease;
        }

        .producto-card:hover {
            transform: translateY(-5px);
        }

        .producto-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .producto-info {
            text-align: center;
        }

        .producto-info h3 {
            font-family: var(--font-principal);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .btn-comprar {
            display: inline-block;
            padding: 10px 25px;
            background-color: var(--negro);
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 15px;
            cursor: pointer;
            border: none;
        }

        .btn-comprar:hover {
            background-color: var(--dorado);
        }
    </style>
</head>
<body>

    <header>
        <h1 id="store-name">Finalook Studio</h1>
    </header>

    <div class="container">
        <div class="productos-grid">
            <div class="producto-card">
                <img src="img/vestido_fina.jpg" alt="Vestido Fina">
                <div class="producto-info">
                    <h3>Vestido Fina</h3>
                    <p>Elegancia en cada movimiento.</p>
                    <button class="btn-comprar">Ver Detalle</button>
                </div>
            </div>

            <div class="producto-card">
                <img src="img/top_nudo.jpg" alt="Top Nudo">
                <div class="producto-info">
                    <h3>Top Nudo</h3>
                    <p>Minimalismo moderno.</p>
                    <button class="btn-comprar">Ver Detalle</button>
                </div>
            </div>

            <div class="producto-card">
                <img src="img/camisa_kala.jpg" alt="Camisa Kala">
                <div class="producto-info">
                    <h3>Camisa Kala</h3>
                    <p>Clásico redefinido.</p>
                    <button class="btn-comprar">Ver Detalle</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Aplicar el nombre de la tienda desde la variable de entorno
        document.getElementById('store-name').innerText = window.ENV.NOMBRE_TIENDA;
        
        console.log("Tienda cargada:", window.ENV.NOMBRE_TIENDA);
    </script>
</body>
</html>
